<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mia Focaccia">
<title>Mia Focaccia</title>
<style>
:root{
  --bg:#faf9f6;--surface:#fff;--surface2:#f5f3ee;
  --border:#e8e5dc;--border2:#d4d0c4;
  --text:#1a1a16;--text2:#5a5848;--text3:#9a9480;
  --accent:#2d5a27;--accent-bg:#eaf3e8;--accent-text:#1e4019;
  --warn-bg:#fff4e0;--warn:#7a4a00;
  --danger-bg:#fdf0f0;--danger:#8b1a1a;
  --Roma-p:#A2392F;--Roma-s:#E4D5B7;
  --Napoli-p:#003087;--Napoli-s:#FFFFFF;
  --Genova-p:#556B2F;--Genova-s:#E4D5B7;
  --Verona-p:#4CAF50;--Verona-s:#FFE082;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
#app{display:flex;flex-direction:column;height:100dvh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:10px}
.hdr img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2)}
.hdr-info{flex:1}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hdr-badge{background:var(--warn-bg);color:var(--warn);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:calc(76px + var(--safe-bot))}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0;gap:2px;color:var(--text3);font-size:9px;font-weight:500;border:none;background:none;cursor:pointer}
.nav-btn svg{width:20px;height:20px}
.nav-btn.active{color:var(--accent)}
.section{display:none}.section.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px}
.metric .lbl{font-size:11px;color:var(--text3);margin-bottom:3px}
.metric .val{font-size:20px;font-weight:700;line-height:1.1}
.metric.wide{grid-column:span 2}
.order-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.order-name{font-weight:600;font-size:15px}
.order-total{font-weight:700;font-size:15px}
.order-meta{font-size:12px;color:var(--text3);margin-bottom:5px}
.order-prods{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.prod-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.prod-chip.Roma{background:var(--Roma-s);color:var(--Roma-p)}
.prod-chip.Napoli{background:var(--Napoli-p);color:var(--Napoli-s)}
.prod-chip.Genova{background:var(--Genova-s);color:var(--Genova-p)}
.prod-chip.Verona{background:var(--Verona-s);color:var(--Verona-p);border:1px solid #e0c040}
.prod-chip.TablaRoma{background:var(--Roma-p);color:var(--Roma-s);border:2px solid #7a2020;font-style:italic}
.prod-chip.TablaNapoli{background:#001a5c;color:#e8f0ff;border:2px solid #001a5c;font-style:italic}
.prod-chip.TablaGenova{background:var(--Genova-p);color:var(--Genova-s);border:2px solid #3a4a1f;font-style:italic}
.prod-chip.TablaVerona{background:#2e7d32;color:var(--Verona-s);border:2px solid #1b5e20;font-style:italic}
.prod-chip.Curry{background:#fff3e0;color:#e65100}
.prod-chip.Pomodo{background:#fce4ec;color:#c62828}
.order-footer{display:flex;justify-content:space-between;align-items:center;gap:8px}
select.inline{border:1px solid var(--border2);border-radius:8px;font-size:12px;padding:4px 6px;background:var(--bg);color:var(--text);font-family:inherit}
.filters{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.sort-btn{padding:5px 10px;border-radius:8px;font-size:12px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;background:var(--surface);color:var(--text);font-family:inherit;-webkit-appearance:none}
.form-group textarea{height:75px;resize:none}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-item{background:var(--surface2);border-radius:10px;border:1px solid var(--border);padding:10px;margin-bottom:8px}
.prod-item select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;margin-bottom:8px;-webkit-appearance:none}
.prod-item-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-family:inherit;flex-shrink:0}
.qty-val{font-size:16px;font-weight:700;min-width:22px;text-align:center}
.price-inline{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)}
.price-inline input{width:80px;padding:5px 7px;font-size:13px;border:1px solid var(--border2);border-radius:8px;text-align:right;-webkit-appearance:none}
.prod-del{color:var(--danger);font-size:14px;background:none;border:none;cursor:pointer;padding:4px;font-family:inherit;flex-shrink:0}
.total-bar{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:13px 14px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-secondary{width:100%;padding:12px;background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-add{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--accent-bg);color:var(--accent);border:1px dashed var(--accent);border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:inherit;width:100%;justify-content:center;margin-bottom:4px;font-weight:600}
.bar-item{margin-bottom:10px}
.bar-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-fill.Roma{background:var(--Roma-p)}.bar-fill.Napoli{background:var(--Napoli-p)}
.bar-fill.Genova{background:var(--Genova-p)}.bar-fill.Verona{background:var(--Verona-p)}
.bar-fill.TablaRoma{background:var(--Roma-p)}.bar-fill.TablaNapoli{background:var(--Napoli-p)}
.bar-fill.TablaGenova{background:var(--Genova-p)}.bar-fill.TablaVerona{background:#2e7d32}
.bar-fill.Curry{background:#e65100}.bar-fill.Pomodo{background:#c62828}.bar-fill.other{background:var(--accent)}
.month-bars{display:flex;align-items:flex-end;gap:3px;height:100px}
.month-bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.month-bar{width:100%;border-radius:3px 3px 0 0;background:var(--accent);min-height:2px}
.month-bar-lbl{font-size:9px;color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis}
.month-bar-val{font-size:9px;color:var(--text2);font-weight:600}
.com-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:6px;font-size:13px}
.com-row:last-child{border-bottom:none}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:14px}
.status-bar{font-size:12px;padding:5px 16px;text-align:center}
.status-ok{background:var(--accent-bg);color:var(--accent-text)}
.status-err{background:var(--danger-bg);color:var(--danger)}
.pag{display:flex;justify-content:center;align-items:center;gap:12px;padding:10px 0;font-size:13px;color:var(--text2)}
.pag-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
.pag-btn:disabled{opacity:.3}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;padding-bottom:var(--safe-bot)}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(16px + var(--safe-bot))}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
</style>
</head>

let orders=[],tab='pedidos',filterEstado='',filterVend='',filterMes='',ingYear='total',ingMonth='total',comMes='',page=0,sortDir='desc';
const PER=20;
let newItems=[],editId=null,editItems=[];

const fmt=n=>'$'+Math.round(n).toLocaleString('es-CL');

// ── FIREBASE OPS ─────────────────────────────────────────
async function loadOrders(){
  setStatus('Cargando...',false,true);
  try{
    const q=query(collection(db,'pedidos'),orderBy('id','desc'));
    const snap=await getDocs(q);
    if(snap.empty){
      // First load — seed from HIST
      setStatus('Cargando historial...',false,true);
      const batch=[];
      for(const o of HIST){
        batch.push(setDoc(doc(db,'pedidos',String(o.id)),o));
      }
      await Promise.all(batch);
      const snap2=await getDocs(q);
      orders=snap2.docs.map(d=>d.data());
    } else {
      orders=snap.docs.map(d=>d.data());
    }
    setStatus('Sincronizado ✓',false,false);
    updateBadge();render();
  }catch(e){
    console.error(e);
    setStatus('Sin conexión — datos locales',true,true);
    orders=[...HIST].sort((a,b)=>b.id-a.id);
    updateBadge();render();
  }
}

async function fbSaveOrder(order){
  await setDoc(doc(db,'pedidos',String(order.id)),order);
}

async function fbUpdateOrder(id,data){
  await updateDoc(doc(db,'pedidos',String(id)),data);
}

async function fbDeleteOrder(id){
  await deleteDoc(doc(db,'pedidos',String(id)));
}

// ── UI HELPERS ────────────────────────────────────────────
function setStatus(msg,err,show){
  document.getElementById('sync-status').textContent=msg;
  const sb=document.getElementById('status-bar');
  if(show){sb.style.display='';sb.className='status-bar '+(err?'status-err':'status-ok');sb.textContent=msg;}
  else sb.style.display='none';
}

function updateBadge(){
  const pend=orders.filter(o=>o.estado==='Pendiente').length;
  const b=document.getElementById('pend-badge');
  if(pend>0){b.textContent=pend+' pendientes';b.style.display='';}else b.style.display='none';
}

function goTab(t,btn){
  tab=t;page=0;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const c=document.getElementById('content');
  if(tab==='pedidos')c.innerHTML=renderPedidos();
  else if(tab==='nuevo')c.innerHTML=renderNuevo();
  else if(tab==='dashboard')c.innerHTML=renderDashboard();
  else if(tab==='ingresos')c.innerHTML=renderIngresos();
  else if(tab==='comisiones')c.innerHTML=renderComisiones();
}

function prodChip(prod,qty){
  const cls=['Roma','Napoli','Genova','Verona','TablaRoma','TablaNapoli','TablaGenova','TablaVerona','Curry','Pomodo'].includes(prod)?prod:'other';
  const name=PROD_NAMES[prod]||prod;
  return `<span class="prod-chip ${cls}">${qty}× ${name}</span>`;
}

// ── PEDIDOS ───────────────────────────────────────────────
function renderPedidos(){
  let list=orders.filter(o=>
    (filterEstado?o.estado===filterEstado:true)&&
    (filterVend?o.vendedor===filterVend:true)&&
    (filterMes?o.fecha&&o.fecha.startsWith(filterMes):true)
  ).slice().sort((a,b)=>sortDir==='asc'?(a.fecha||'').localeCompare(b.fecha||''):((b.fecha||'').localeCompare(a.fecha||'')));

  const tf=list.reduce((s,o)=>s+o.total,0);
  const cob=list.filter(o=>o.estado==='Pagado').reduce((s,o)=>s+o.total,0);
  const pend=list.filter(o=>o.estado==='Pendiente').length;
  let qFoc=0,qCurry=0,qPomodo=0,qTabla=0;
  list.forEach(o=>o.items.forEach(i=>{
    const p=i.prod||'';
    if(p.startsWith('Tabla'))qTabla+=i.qty;
    else if(p==='Curry')qCurry+=i.qty;
    else if(p==='Pomodo')qPomodo+=i.qty;
    else if(['Roma','Napoli','Genova','Verona'].includes(p))qFoc+=i.qty;
  }));

  const total=list.length,pages=Math.ceil(total/PER);
  if(page>=pages)page=Math.max(0,pages-1);
  const slice=list.slice(page*PER,(page+1)*PER);

  return `
  <div class="metrics">
    <div class="metric"><div class="lbl">Pedidos</div><div class="val">${list.length}</div></div>
    <div class="metric"><div class="lbl">Pendientes</div><div class="val" style="color:var(--warn)">${pend}</div></div>
    <div class="metric"><div class="lbl">Facturado</div><div class="val" style="font-size:17px">${fmt(tf)}</div></div>
    <div class="metric"><div class="lbl">Cobrado</div><div class="val" style="font-size:17px;color:var(--accent)">${fmt(cob)}</div></div>
    </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
    <div class="metric"><div class="lbl">🍞 Focaccias</div><div class="val">${qFoc}</div></div>
    <div class="metric"><div class="lbl">🍽️ Tablas</div><div class="val">${qTabla}</div></div>
    <div class="metric"><div class="lbl">🍗 Congelados</div><div class="val">${qCurry+qPomodo}</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn ${!filterEstado?'active':''}" onclick="filterEstado='';page=0;render()">Todos</button>
    <button class="filter-btn ${filterEstado==='Pendiente'?'active':''}" onclick="filterEstado='Pendiente';page=0;render()">Pendientes</button>
    <button class="filter-btn ${filterEstado==='Pagado'?'active':''}" onclick="filterEstado='Pagado';page=0;render()">Pagados</button>
    <select class="inline" onchange="filterVend=this.value;page=0;render()">
      <option value="" ${!filterVend?'selected':''}>Todos</option>
      ${Object.entries(VEND).map(([k,n])=>`<option value="${k}" ${filterVend===k?'selected':''}>${n}</option>`).join('')}
    </select>
    <select class="inline" onchange="filterMes=this.value;page=0;render()">
      <option value="" ${!filterMes?'selected':''}>Todos los meses</option>
      ${MONTH_KEYS.map(m=>`<option value="${m}" ${filterMes===m?'selected':''}>${MONTH_LBLS[m]}</option>`).join('')}
    </select>
    <button class="sort-btn" onclick="sortDir=sortDir==='desc'?'asc':'desc';render()">📅 ${sortDir==='desc'?'↓ Reciente':'↑ Antiguo'}</button>
  </div>
  ${!slice.length?'<div class="empty">No hay pedidos</div>':slice.map(o=>`
  <div class="order-item" style="border-left:3px solid ${o.estado==='Pendiente'?'#e57373':'#81c784'}">
    <div class="order-top"><div class="order-name">${o.cliente}</div><div class="order-total">${fmt(o.total)}</div></div>
    <div class="order-meta">${o.fecha||'—'} · ${o.vendedor?VEND[o.vendedor]||o.vendedor:'—'}</div>
    <div class="order-prods">${o.items.map(i=>prodChip(i.prod||i.name,i.qty)).join('')}</div>
    <div class="order-footer">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${o.estado==='Pagado'?'#e8f5e9':'#ffebee'};color:${o.estado==='Pagado'?'#2e7d32':'#c62828'}">${o.estado==='Pagado'?'✓ Pagado':'⏳ Pendiente'}</span>
        <select class="inline" onchange="doEstado(${o.id},this.value)" style="font-size:11px;padding:3px 5px">
          <option value="Pendiente" ${o.estado==='Pendiente'?'selected':''}>Pendiente</option>
          <option value="Pagado" ${o.estado==='Pagado'?'selected':''}>Pagado</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="openEdit(${o.id})" style="background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit">Editar</button>
        <button onclick="doDelete(${o.id})" style="background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;padding:4px">✕</button>
      </div>
    </div>
  </div>`).join('')}
  ${pages>1?`<div class="pag">
    <button class="pag-btn" onclick="page--;render()" ${page===0?'disabled':''}>←</button>
    <span>${page+1} / ${pages}</span>
    <button class="pag-btn" onclick="page++;render()" ${page===pages-1?'disabled':''}>→</button>
  </div>`:''}`;
}

// ── NUEVO PEDIDO ──────────────────────────────────────────
function prodRow(item,i,mode){
  const arr=mode==='new'?'newItems':'editItems';
  return `<div class="prod-item">
    <select onchange="${arr}[${i}].prod=this.options[this.selectedIndex].getAttribute('data-k');${arr}[${i}].name=this.options[this.selectedIndex].text;${arr}[${i}].price=parseInt(this.options[this.selectedIndex].getAttribute('data-p'));${mode==='new'?'render()':'renderEditContent()'}">
      ${PRODS.map(p=>`<option data-k="${p.k}" data-p="${p.price}" ${item.prod===p.k?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <div class="prod-item-row">
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="${arr}[${i}].qty=Math.max(1,${arr}[${i}].qty-1);${mode==='new'?'render()':'renderEditContent()'}">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="${arr}[${i}].qty++;${mode==='new'?'render()':'renderEditContent()'}">+</button>
      </div>
      <div class="price-inline">$ <input type="number" value="${item.price}" min="0" onchange="${arr}[${i}].price=parseInt(this.value)||0;${mode==='new'?'render()':'renderEditContent()'}"> = ${fmt(item.price*item.qty)}</div>
      <button class="prod-del" onclick="${arr}.splice(${i},1);${mode==='new'?'render()':'renderEditContent()'}">✕</button>
    </div>
  </div>`;
}

function renderNuevo(){
  const total=newItems.reduce((s,i)=>s+i.price*i.qty,0);
  const tmr=new Date();tmr.setDate(tmr.getDate()+1);
  return `
  <div class="card">
    <div class="card-title">Nuevo pedido</div>
    <div class="form-group"><label>Cliente</label><input id="nc" placeholder="Nombre del cliente"></div>
    <div class="form-row2">
      <div class="form-group"><label>Teléfono</label><input id="nt" placeholder="+56 9..."></div>
      <div class="form-group"><label>Fecha entrega</label><input type="date" id="nf" value="${tmr.toISOString().split('T')[0]}"></div>
    </div>
    <div class="form-group"><label>Vendedor/a</label>
      <select id="nv">
        <option value="">Sin comisión</option>
        ${Object.entries(VEND).map(([k,n])=>`<option value="${k}">${n}${k==='german'?' (25%)':''}</option>`).join('')}
      </select>
    </div>
    <div class="card-title" style="margin-bottom:8px">Productos</div>
    ${newItems.map((item,i)=>prodRow(item,i,'new')).join('')}
    <button class="btn-add" onclick="newItems.push({prod:'Roma',name:PRODS[0].name,price:PRODS[0].price,qty:1});render()">+ Agregar producto</button>
    <div class="form-group"><label>Notas</label><textarea id="nn" placeholder="Indicaciones..."></textarea></div>
    <div class="total-bar"><span style="font-size:13px;color:var(--text2)">Total</span><span style="font-size:22px;font-weight:700">${fmt(total)}</span></div>
    <button class="btn-primary" onclick="doGuardar()">Guardar pedido</button>
    <button class="btn-secondary" onclick="newItems=[];render()">Cancelar</button>
  </div>`;
}

// ── EDITAR ────────────────────────────────────────────────
function openEdit(id){
  const o=orders.find(o=>o.id===id);if(!o)return;
  editId=id;editItems=o.items.map(i=>({...i}));
  document.getElementById('edit-modal').style.display='flex';
  renderEditContent();
}
function renderEditContent(){
  const o=orders.find(o=>o.id===editId);if(!o)return;
  const total=editItems.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('edit-content').innerHTML=`
    <div class="form-row2" style="margin-bottom:12px">
      <div class="form-group"><label>Cliente</label><input id="ec" value="${o.cliente}"></div>
      <div class="form-group"><label>Fecha</label><input type="date" id="ef" value="${o.fecha||''}"></div>
    </div>
    <div class="form-group"><label>Vendedor</label>
      <select id="ev">
        <option value="" ${!o.vendedor?'selected':''}>Sin comisión</option>
        ${Object.entries(VEND).map(([k,n])=>`<option value="${k}" ${o.vendedor===k?'selected':''}>${n}${k==='german'?' (25%)':''}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Productos</div>
    ${editItems.map((item,i)=>prodRow(item,i,'edit')).join('')}
    <button class="btn-add" style="margin-bottom:12px" onclick="editItems.push({prod:'Roma',name:PRODS[0].name,price:PRODS[0].price,qty:1});renderEditContent()">+ Agregar producto</button>
    <div class="total-bar"><span style="font-size:13px;color:var(--text2)">Total</span><span style="font-size:20px;font-weight:700">${fmt(total)}</span></div>
    <button class="btn-primary" onclick="doSaveEdit()">Guardar cambios</button>
    <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>`;
}
function closeEdit(){document.getElementById('edit-modal').style.display='none';editId=null;editItems=[];}
async function doSaveEdit(){
  if(!editItems.length){alert('Agregá al menos un producto');return;}
  const o=orders.find(o=>o.id===editId);if(!o)return;
  o.cliente=document.getElementById('ec').value.trim()||o.cliente;
  o.fecha=document.getElementById('ef').value||o.fecha;
  o.vendedor=document.getElementById('ev').value;
  o.items=editItems.map(i=>({...i}));
  o.total=o.items.reduce((s,i)=>s+i.price*i.qty,0);
  closeEdit();updateBadge();render();
  try{await fbUpdateOrder(editId,{cliente:o.cliente,fecha:o.fecha,vendedor:o.vendedor,items:o.items,total:o.total});setStatus('Guardado ✓',false,false);}
  catch(e){setStatus('Error al guardar',true,true);}
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDashboard(){
  const pagados=orders.filter(o=>o.estado==='Pagado');
  const totalFact=orders.reduce((s,o)=>s+o.total,0);
  const totalCob=pagados.reduce((s,o)=>s+o.total,0);
  const totalPend=orders.filter(o=>o.estado==='Pendiente').reduce((s,o)=>s+o.total,0);
  const prodCounts={};
  orders.forEach(o=>o.items.forEach(i=>{const k=i.prod||'other';prodCounts[k]=(prodCounts[k]||0)+i.qty;}));
  const prodSorted=Object.entries(prodCounts).sort((a,b)=>b[1]-a[1]);
  const maxProd=prodSorted[0]?.[1]||1;
  const monthData={};MONTH_KEYS.forEach(k=>monthData[k]=0);
  orders.forEach(o=>{if(o.fecha){const m=o.fecha.slice(0,7);if(monthData[m]!==undefined)monthData[m]+=o.total;}});
  const maxMonth=Math.max(...Object.values(monthData),1);
  const vendData={};Object.keys(VEND).forEach(k=>vendData[k]=0);
  pagados.forEach(o=>{if(o.vendedor&&vendData[o.vendedor]!==undefined)vendData[o.vendedor]+=o.total;});
  const maxVend=Math.max(...Object.values(vendData),1);
  const vendColors={mane:'#A2392F',daniel:'#003087',luca:'#556B2F',german:'#4CAF50'};
  const CHIP_CLS=['Roma','Napoli','Genova','Verona','TablaRoma','TablaNapoli','TablaGenova','TablaVerona','Curry','Pomodo'];
  return `
  <div class="card">
    <div class="card-title">Resumen de ingresos</div>
    <div class="metrics" style="margin-bottom:0">
      <div class="metric"><div class="lbl">Facturado total</div><div class="val" style="font-size:16px">${fmt(totalFact)}</div></div>
      <div class="metric"><div class="lbl">Cobrado</div><div class="val" style="font-size:16px;color:var(--accent)">${fmt(totalCob)}</div></div>
      <div class="metric"><div class="lbl">Por cobrar</div><div class="val" style="font-size:16px;color:var(--warn)">${fmt(totalPend)}</div></div>
      <div class="metric"><div class="lbl">Pedidos totales</div><div class="val">${orders.length}</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Total productos vendidos</div>
    ${prodSorted.map(([k,q])=>{const cls=CHIP_CLS.includes(k)?k:'other';return`<div class="bar-item"><div class="bar-head"><span style="font-weight:500">${PROD_NAMES[k]||k}</span><span style="font-weight:700">${q} u.</span></div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.round(q/maxProd*100)}%"></div></div></div>`;}).join('')}
  </div>
  <div class="card">
    <div class="card-title">Ingresos por mes</div>
    <div class="month-bars">
      ${MONTH_KEYS.map(m=>{const v=monthData[m]||0;const h=Math.max(Math.round(v/maxMonth*88),v>0?4:0);return`<div class="month-bar-col"><div class="month-bar-val">${v>0?'$'+(v/1000).toFixed(0)+'k':''}</div><div class="month-bar" style="height:${h}px"></div><div class="month-bar-lbl">${MONTH_LBLS[m]||m}</div></div>`;}).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Ventas por vendedor (pagadas)</div>
    ${Object.entries(VEND).map(([k,n])=>{const v=vendData[k]||0;return`<div class="bar-item"><div class="bar-head"><span style="font-weight:500">${n}</span><span style="font-weight:700">${fmt(v)}</span></div><div class="bar-track"><div style="height:100%;border-radius:4px;background:${vendColors[k]||'#888'};width:${Math.round(v/maxVend*100)}%"></div></div></div>`;}).join('')}
  </div>`;
}

// ── INGRESOS ──────────────────────────────────────────────
function renderIngresos(){
  let ords=orders;
  if(ingYear!=='total')ords=ords.filter(o=>o.fecha&&o.fecha.startsWith(ingYear));
  if(ingMonth!=='total')ords=ords.filter(o=>o.fecha&&o.fecha.slice(5,7)===ingMonth);
  const total=ords.reduce((s,o)=>s+o.total,0);
  const cob=ords.filter(o=>o.estado==='Pagado').reduce((s,o)=>s+o.total,0);
  const porCob=ords.filter(o=>o.estado==='Pendiente').reduce((s,o)=>s+o.total,0);
  const counts={};ords.forEach(o=>o.items.forEach(i=>{const k=i.prod||'other';counts[k]=(counts[k]||0)+i.qty;}));
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const mx=sorted[0]?.[1]||1;
  const years=['total',...[...new Set(orders.map(o=>o.fecha&&o.fecha.slice(0,4)).filter(Boolean))].sort()];
  const MNAMES={total:'Todos','01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};
  const mkeys=['total','01','02','03','04','05','06','07','08','09','10','11','12'];
  const CHIP_CLS=['Roma','Napoli','Genova','Verona','TablaRoma','TablaNapoli','TablaGenova','TablaVerona','Curry','Pomodo'];
  return `
  <div class="card" style="margin-bottom:10px">
    <div class="card-title" style="margin-bottom:10px">Filtrar período</div>
    <div class="form-row2">
      <div class="form-group" style="margin-bottom:0"><label>Año</label>
        <select onchange="ingYear=this.value;render()">
          ${years.map(y=>`<option value="${y}" ${ingYear===y?'selected':''}}>${y==='total'?'Todos los años':y}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0"><label>Mes</label>
        <select onchange="ingMonth=this.value;render()">
          ${mkeys.map(m=>`<option value="${m}" ${ingMonth===m?'selected':''}}>${MNAMES[m]}</option>`).join('')}
        </select>
      </div>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="lbl">Facturado</div><div class="val" style="font-size:17px">${fmt(total)}</div></div>
    <div class="metric"><div class="lbl">Cobrado</div><div class="val" style="font-size:17px;color:var(--accent)">${fmt(cob)}</div></div>
    <div class="metric wide"><div class="lbl">Por cobrar</div><div class="val" style="color:var(--warn)">${fmt(porCob)}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Más vendidos</div>
    ${sorted.length?sorted.map(([k,q])=>{const cls=CHIP_CLS.includes(k)?k:'other';return`<div class="bar-item"><div class="bar-head"><span>${PROD_NAMES[k]||k}</span><span style="font-weight:700">${q} u.</span></div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.round(q/mx*100)}%"></div></div></div>`;}).join(''):`<div class="empty">Sin datos</div>`}
  </div>`;
}

// ── COMISIONES ────────────────────────────────────────────
function renderComisiones(){
  const allOrd=(comMes?orders.filter(o=>o.fecha&&o.fecha.startsWith(comMes)):orders);
  const stats={};Object.keys(VEND).forEach(k=>stats[k]={total:0,productos:0});
  allOrd.forEach(o=>{
    if(o.vendedor&&stats[o.vendedor]){
      stats[o.vendedor].total+=o.total;
      stats[o.vendedor].productos+=o.items.reduce((s,i)=>s+i.qty,0);
    }
  });
  const PCT={mane:0,daniel:0,luca:0,german:0.25};
  const totalCom=Object.keys(VEND).reduce((s,k)=>s+stats[k].total*PCT[k],0);
  const months=[['','Todo el período'],...MONTH_KEYS.map(k=>[k,MONTH_LBLS[k]])];
  return `
  <div class="card">
    <div class="card-title">Comisiones</div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <select class="inline" onchange="comMes=this.value;render()">
        ${months.map(([v,l])=>`<option value="${v}" ${comMes===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;font-size:11px;color:var(--text3);padding-bottom:8px;border-bottom:1px solid var(--border);font-weight:700;text-transform:uppercase;letter-spacing:.4px;gap:4px">
      <span style="flex:1.4">Vendedor</span><span style="flex:1.2;text-align:right">Ventas</span><span style="flex:.7;text-align:right">Productos</span><span style="flex:1.1;text-align:right">Comisión (25%)</span><span style="flex:1.1;text-align:right">Te quedas (75%)</span>
    </div>
    ${Object.entries(VEND).map(([k,n])=>{
      const comision=stats[k].total*PCT[k];
      const teQuedas=stats[k].total-comision;
      return`<div class="com-row" style="gap:4px">
        <span style="flex:1.4;font-weight:600">${n}${k==='german'?' <span style="background:var(--warn-bg);color:var(--warn);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600">25%</span>':''}</span>
        <span style="flex:1.2;text-align:right">${fmt(stats[k].total)}</span>
        <span style="flex:.7;text-align:right;color:var(--text3)">${stats[k].productos}</span>
        <span style="flex:1.1;text-align:right;font-weight:700;color:${PCT[k]>0?'var(--accent)':'var(--text3)'}">${PCT[k]>0?fmt(comision):'—'}</span>
        <span style="flex:1.1;text-align:right;font-weight:700;color:${PCT[k]>0?'var(--accent-text)':'var(--text3)'}">${PCT[k]>0?fmt(teQuedas):'—'}</span>
      </div>`;}).join('')}
    <div style="display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid var(--border);margin-top:4px">
      <span style="color:var(--text2);font-weight:600;font-size:14px">Total comisión a pagar a Germán</span>
      <span style="font-weight:700;font-size:18px">${fmt(totalCom)}</span>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:8px">Incluye todos los pedidos (pagados y pendientes).</p>
  </div>`;
}

// ── ACCIONES ──────────────────────────────────────────────
async function doEstado(id,estado){
  const o=orders.find(o=>o.id===id);if(o){o.estado=estado;updateBadge();render();}
  try{await fbUpdateOrder(id,{estado});setStatus('Guardado ✓',false,false);}
  catch(e){setStatus('Error al guardar',true,true);}
}

async function doDelete(id){
  if(!confirm('¿Eliminar este pedido?'))return;
  orders=orders.filter(o=>o.id!==id);updateBadge();render();
  try{await fbDeleteOrder(id);}
  catch(e){setStatus('Error al eliminar',true,true);}
}

async function doGuardar(){
  const c=document.getElementById('nc')?.value.trim();
  if(!c){alert('Ingresá el nombre del cliente');return;}
  if(!newItems.length){alert('Agregá al menos un producto');return;}
  const total=newItems.reduce((s,i)=>s+i.price*i.qty,0);
  const order={
    id:Date.now(),
    cliente:c,
    telefono:document.getElementById('nt')?.value.trim()||'',
    fecha:document.getElementById('nf')?.value||'',
    vendedor:document.getElementById('nv')?.value||'',
    notas:document.getElementById('nn')?.value.trim()||'',
    items:newItems.map(i=>({prod:i.prod,name:i.name,price:i.price,qty:i.qty})),
    total,estado:'Pendiente',creado:new Date().toISOString()
  };
  orders.unshift(order);newItems=[];
  updateBadge();tab='pedidos';page=0;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  render();
  try{await fbSaveOrder(order);setStatus('Guardado ✓',false,false);}
  catch(e){setStatus('Error al guardar',true,true);}
}

// Make functions global for onclick handlers
window.goTab=goTab;window.render=render;window.renderEditContent=renderEditContent;
window.openEdit=openEdit;window.closeEdit=closeEdit;window.doSaveEdit=doSaveEdit;
window.doEstado=doEstado;window.doDelete=doDelete;window.doGuardar=doGuardar;
window.filterEstado=filterEstado;window.filterVend=filterVend;window.filterMes=filterMes;
window.ingYear=ingYear;window.ingMonth=ingMonth;window.comMes=comMes;
window.page=page;window.sortDir=sortDir;window.newItems=newItems;
window.editItems=editItems;window.PRODS=PRODS;window.VEND=VEND;
window.MONTH_KEYS=MONTH_KEYS;window.MONTH_LBLS=MONTH_LBLS;

// Proxy setters to sync module vars with window
Object.defineProperties(window,{
  filterEstado:{get:()=>filterEstado,set:v=>{filterEstado=v;}},
  filterVend:{get:()=>filterVend,set:v=>{filterVend=v;}},
  filterMes:{get:()=>filterMes,set:v=>{filterMes=v;}},
  ingYear:{get:()=>ingYear,set:v=>{ingYear=v;}},
  ingMonth:{get:()=>ingMonth,set:v=>{ingMonth=v;}},
  comMes:{get:()=>comMes,set:v=>{comMes=v;}},
  page:{get:()=>page,set:v=>{page=v;}},
  sortDir:{get:()=>sortDir,set:v=>{sortDir=v;}},
  newItems:{get:()=>newItems,set:v=>{newItems=v;}},
  editItems:{get:()=>editItems,set:v=>{editItems=v;}},
});

loadOrders();
</script>
</body>
</html>
